
services:
  postgres:
    image: 'postgres:16'
    restart: 'unless-stopped'
    container_name: dp-postgres-pizza-app
    environment:
      - 'POSTGRES_DB=dp_pizza_db'
      - 'POSTGRES_PASSWORD=dp_play_w333'
      - 'POSTGRES_USER=dp_play'
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:

